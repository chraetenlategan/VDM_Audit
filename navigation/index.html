<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VDM – Tools & Links</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy: #1a2540;
    --gold: #b8963e;
    --gold-light: #d4af62;
    --cream: #f5f0e8;
    --mid: #e8e0d0;
    --text: #2c2c2c;
    --muted: #7a7060;
  }

  body {
    font-family: 'Source Sans 3', sans-serif;
    background: var(--cream);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 48px 24px 80px;
  }

  /* ── HEADER ── */
  header {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    margin-bottom: 56px;
  }

  .logo-wrap {
    width: 110px;
    height: 110px;
    background: var(--navy);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 24px rgba(26,37,64,0.18);
    position: relative;
    overflow: hidden;
  }

  /* Monogram logo */
  .logo-wrap svg {
    width: 72px;
    height: 72px;
  }

  .divider {
    width: 60px;
    height: 2px;
    background: var(--gold);
    border-radius: 2px;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: 1.9rem;
    color: var(--navy);
    letter-spacing: 0.02em;
    text-align: center;
  }

  .subtitle {
    font-size: 0.85rem;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    font-weight: 300;
  }

  /* ── GRID ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 20px;
    width: 100%;
    max-width: 820px;
  }

  .card {
    background: #fff;
    border: 1px solid var(--mid);
    border-radius: 10px;
    padding: 28px 28px 24px;
    text-decoration: none;
    color: inherit;
    display: flex;
    flex-direction: column;
    gap: 10px;
    transition: box-shadow 0.2s, transform 0.2s, border-color 0.2s;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 4px;
    height: 100%;
    background: var(--gold);
    transition: width 0.2s;
  }

  .card:hover {
    box-shadow: 0 8px 32px rgba(26,37,64,0.12);
    transform: translateY(-3px);
    border-color: var(--gold-light);
  }

  .card:hover::before {
    width: 6px;
  }

  .card-icon {
    width: 36px;
    height: 36px;
    background: var(--navy);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 4px;
  }

  .card-icon svg {
    width: 18px;
    height: 18px;
    stroke: var(--gold);
    fill: none;
    stroke-width: 1.8;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .card-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    color: var(--navy);
  }

  .card-desc {
    font-size: 0.82rem;
    color: var(--muted);
    font-weight: 300;
    line-height: 1.5;
  }

  .card-arrow {
    margin-top: auto;
    padding-top: 12px;
    font-size: 0.78rem;
    color: var(--gold);
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .card-arrow::after {
    content: '→';
    transition: transform 0.2s;
  }

  .card:hover .card-arrow::after {
    transform: translateX(4px);
  }

  footer {
    margin-top: 64px;
    font-size: 0.75rem;
    color: var(--muted);
    letter-spacing: 0.06em;
    opacity: 0.6;
  }
</style>
</head>
<body>

<header>
  <!-- VDM Monogram Logo -->
  <div class="logo-wrap">
    <svg viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- V -->
      <text x="4" y="52" font-family="Georgia, serif" font-size="28" font-weight="700" fill="#b8963e">V</text>
      <!-- D -->
      <text x="24" y="52" font-family="Georgia, serif" font-size="28" font-weight="700" fill="#d4af62">D</text>
      <!-- M -->
      <text x="44" y="52" font-family="Georgia, serif" font-size="28" font-weight="700" fill="#b8963e">M</text>
      <!-- underline -->
      <line x1="6" y1="57" x2="66" y2="57" stroke="#b8963e" stroke-width="1.5" opacity="0.6"/>
    </svg>
  </div>

  <div class="divider"></div>
  <h1>H/L van der Merwe</h1>
  <p class="subtitle">Chartered Accountant (SA) &nbsp;·&nbsp; Standerton</p>
</header>

<div class="grid">

  <a class="card" href="https://chraetenlategan.github.io/vdm-verslag/" target="_blank">
    <div class="card-icon">
      <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
    </div>
    <div class="card-title">Financial Statements</div>
    <div class="card-desc">Annual financial statements, reports and related documents.</div>
    <div class="card-arrow">Open</div>
  </a>

  <a class="card" href="https://chraetenlategan.github.io/vdm/" target="_blank">
    <div class="card-icon">
      <svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
    </div>
    <div class="card-title">Client Questionnaire</div>
    <div class="card-desc">Onboarding and information gathering form for new and existing clients.</div>
    <div class="card-arrow">Open</div>
  </a>

</div>

<footer>© H/L van der Merwe CA(SA) &nbsp;·&nbsp; Standerton</footer>

</body>
</html>
